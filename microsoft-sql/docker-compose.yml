services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: mssql-db
    env_file: .env
    restart: always
    shm_size: '2gb'
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
      MSSQL_AGENT_ENABLED: "true"
    ports:
      - "${HOST_PORT}:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    stop_grace_period: 30s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: '8'         
          memory: 8G        
        reservations:
          cpus: '4'
          memory: 4G
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/1433"]
      interval: 5s
      retries: 10

  mssql-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: mssql-init
    restart: on-failure
    depends_on:
      mssql:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./init.sql:/init.template 
    entrypoint: >
      sh -c "
        apt-get update && 
        apt-get install -y --no-install-recommends gettext-base && 
        envsubst < /init.template > /init.sql && 
        /opt/mssql-tools/bin/sqlcmd -S mssql-db -U sa -P $${MSSQL_SA_PASSWORD} -i /init.sql
      "

volumes:
  mssql-data: